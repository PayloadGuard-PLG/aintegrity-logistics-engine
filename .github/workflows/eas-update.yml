name: EAS Update

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  payloadguard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: PayloadGuard Analysis
        uses: PayloadGuard-PLG/payload-consequence-analyser@d8435494e71ee713a7c7d4160bae182e14aef399

  update:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Push OTA update
        run: npx eas-cli update --branch preview --platform android --message "$COMMIT_MSG" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
